<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Z1N Protocol – Mint Artefact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #050812;
      --card-bg: #020617;
      --text-main: #ffffff;
      --text-soft: #8f9ab5;
      --accent: #5ee8a0;
      --card-border: rgba(148,163,184,0.18);
      --keys-accent: #ffd556;
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scrollbar-gutter: stable; overflow-y: scroll; }
    body { background: var(--bg); color: var(--text-main); font-family: system-ui,-apple-system,"Segoe UI",sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    header { height: 72px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: rgba(5,8,18,0.94); backdrop-filter: blur(12px); z-index: 100; }
    .nav-inner { width: 100%; max-width: 1200px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo-link { display: inline-flex; align-items: center; gap: 8px; }
    .logo-dot { width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.35); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .logo-text { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; display: flex; gap: 6px; }
    .logo-main { font-weight: 600; } .logo-sub { opacity: 0.6; font-weight: 400; }
    .nav-links { display: flex; gap: 22px; font-size: 13px; opacity: 0.85; }
    .nav-links a:hover { color: var(--accent); opacity: 1; }
    .nav-links a.active-keys { color: var(--keys-accent); }
    .hamburger { display: none; background: rgba(15,23,42,0.8); border: 1px solid rgba(148,163,184,0.25); border-radius: 8px; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; }
    .hamburger span { display: block; width: 20px; height: 1.5px; background: var(--text-main); border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    @media(max-width:800px){
      .hamburger { display: flex; }
      .nav-links { display: none; position: absolute; top: 72px; left: 0; right: 0; background: rgba(10,15,26,0.98); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(148,163,184,0.2); box-shadow: 0 12px 32px rgba(0,0,0,0.6); flex-direction: column; padding: 16px 24px 20px; gap: 14px; font-size: 14px; z-index: 200; }
      .nav-links.open { display: flex; }
    }

    .page { max-width: 1160px; margin: 0 auto; padding: 44px 24px 80px; }
    .back-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-soft); margin-bottom: 36px; transition: color 0.2s; }
    .back-link:hover { color: var(--accent); }

    .mint-layout { display: grid; grid-template-columns: 400px 1fr; gap: 52px; align-items: start; }
    @media(max-width:960px){ .mint-layout { grid-template-columns: 1fr; gap: 32px; } }

    /* LEFT */
    .left-col { display: flex; flex-direction: column; }

    .state-nav { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 16px; }
    .s-dot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid rgba(148,163,184,0.28); background: transparent; cursor: pointer; transition: all 0.2s; padding: 0; flex-shrink: 0; }
    .s-dot:hover { transform: scale(1.2); }
    .s-dot.d-unshared.active { background: rgba(148,163,184,0.55); border-color: rgba(148,163,184,0.8); }
    .s-dot.d-pending.active  { background: var(--keys-accent); border-color: var(--keys-accent); box-shadow: 0 0 8px rgba(255,213,86,0.5); }
    .s-dot.d-active.active   { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(94,232,160,0.5); }
    .s-dot.d-released.active { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 8px rgba(248,113,113,0.5); }
    .s-arrow { display: flex; align-items: center; padding: 0 7px; flex-shrink: 0; }
    .s-arrow-line { width: 20px; height: 1.5px; background: rgba(148,163,184,0.18); }
    .s-arrow-head { width: 0; height: 0; border-top: 4px solid transparent; border-bottom: 4px solid transparent; border-left: 6px solid rgba(148,163,184,0.22); }

    .card-stage { position: relative; border-radius: 20px; overflow: hidden; touch-action: pan-y pinch-zoom; transition: box-shadow 0.35s; }
    .card-stage.state-unshared { box-shadow: 0 0 0 2px rgba(148,163,184,0.22); }
    .card-stage.state-pending  { box-shadow: 0 0 0 2px rgba(255,213,86,0.55), 0 0 28px rgba(255,213,86,0.08); }
    .card-stage.state-active   { box-shadow: 0 0 0 2px rgba(94,232,160,0.55), 0 0 28px rgba(94,232,160,0.1); }
    .card-stage.state-released { box-shadow: 0 0 0 2px rgba(248,113,113,0.45), 0 0 22px rgba(248,113,113,0.07); }

    .artefact-preview { width: 100%; aspect-ratio: 500/760; background: linear-gradient(135deg,#0a0f1a,#111827 50%,#0f172a); display: flex; align-items: center; justify-content: center; position: relative; cursor: zoom-in; overflow: hidden; }
    .artefact-preview img { width: 100%; height: 100%; object-fit: contain; display: none; position: absolute; inset: 0; z-index: 0; }
    .artefact-preview img.loaded { display: block; }
    .preview-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; pointer-events: none; z-index: 1; }
    .preview-glyph { font-size: 80px; line-height: 1; transition: color 0.35s, filter 0.35s; color: rgba(148,163,184,0.12); }
    .card-stage.state-pending  .preview-glyph { color: #ffd556; filter: drop-shadow(0 0 16px rgba(255,213,86,0.5)); }
    .card-stage.state-released .preview-glyph { color: #f87171; filter: drop-shadow(0 0 14px rgba(248,113,113,0.45)); opacity: 0.7; }
    .preview-spinner { width: 26px; height: 26px; border: 2px solid rgba(94,232,160,0.14); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; display: none; }
    .preview-spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-badge { position: absolute; top: 13px; left: 13px; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px; border-radius: 6px; transition: all 0.3s; z-index: 10; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    .card-stage.state-unshared .state-badge { background: rgba(5,8,18,0.7); color: var(--text-soft); border: 1px solid rgba(148,163,184,0.22); }
    .card-stage.state-pending  .state-badge { background: rgba(5,8,18,0.7); color: var(--keys-accent); border: 1px solid rgba(255,213,86,0.35); }
    .card-stage.state-active   .state-badge { background: rgba(5,8,18,0.7); color: var(--accent); border: 1px solid rgba(94,232,160,0.35); }
    .card-stage.state-released .state-badge { background: rgba(5,8,18,0.7); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }

    .swipe-arrows { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; pointer-events: none; padding: 0 10px; }
    .swipe-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(5,8,18,0.6); border: 1px solid rgba(148,163,184,0.18); color: var(--text-soft); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; pointer-events: all; transition: all 0.2s; backdrop-filter: blur(4px); }
    .swipe-btn:hover { background: rgba(5,8,18,0.85); color: var(--text-main); }
    .swipe-btn:disabled { opacity: 0.18; pointer-events: none; }

    .mint-form { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
    .insc-label { font-size: 11px; color: var(--text-soft); display: flex; justify-content: space-between; align-items: center; }
    .insc-count { opacity: 0.6; font-size: 10px; }
    .insc-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--card-border); border-radius: 9px; padding: 10px 13px; font-size: 13px; color: var(--text-main); font-family: inherit; transition: border-color 0.2s; }
    .insc-input:focus { outline: none; border-color: rgba(94,232,160,0.42); }
    .insc-input::placeholder { color: var(--text-soft); opacity: 0.5; }
    .mint-btn { width: 100%; padding: 13px; background: rgba(94,232,160,0.13); border: 1px solid rgba(94,232,160,0.42); border-radius: 10px; color: var(--accent); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .mint-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #000; box-shadow: 0 4px 20px rgba(94,232,160,0.25); }
    .mint-btn:disabled { opacity: 0.42; cursor: not-allowed; }
    .status-msg { padding: 10px 13px; border-radius: 8px; font-size: 12px; line-height: 1.55; }
    .status-msg.success { background: rgba(94,232,160,0.09); color: var(--accent); border: 1px solid rgba(94,232,160,0.18); }
    .status-msg.error   { background: rgba(248,113,113,0.09); color: var(--danger); border: 1px solid rgba(248,113,113,0.18); }
    .status-msg.pending { background: rgba(255,213,86,0.09); color: var(--keys-accent); border: 1px solid rgba(255,213,86,0.18); }

    /* RIGHT */
    .right-col { padding-top: 2px; position: sticky; top: 92px; }
    @media(max-width:960px){ .right-col { position: static; } }

    .state-eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
    .eyebrow-unshared { color: var(--text-soft); }
    .eyebrow-pending  { color: var(--keys-accent); }
    .eyebrow-active   { color: var(--accent); }
    .eyebrow-released { color: var(--danger); }

    .state-title { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 14px; }
    .title-unshared { color: var(--accent); }
    .title-pending  { color: var(--keys-accent); }
    .title-active   { color: var(--accent); }
    .title-released { color: var(--danger); }

    .state-desc { font-size: 15px; line-height: 1.7; color: var(--text-soft); margin-bottom: 28px; max-width: 460px; }

    .pov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
    @media(max-width:560px){ .pov-grid { grid-template-columns: 1fr; } }
    .pov-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; }
    .pov-head { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; color: var(--text-soft); }
    .pov-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pov-item { font-size: 12px; color: var(--text-soft); line-height: 1.6; margin-bottom: 5px; padding-left: 13px; position: relative; }
    .pov-item::before { content: "·"; position: absolute; left: 3px; opacity: 0.4; }
    .pov-item:last-of-type { margin-bottom: 8px; }
    .pov-action { display: inline-flex; align-items: center; margin-top: 2px; font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 7px; cursor: default; margin-right: 4px; margin-bottom: 4px; }
    .act-green  { background: rgba(94,232,160,0.1); color: var(--accent); border: 1px solid rgba(94,232,160,0.22); }
    .act-yellow { background: rgba(255,213,86,0.1); color: var(--keys-accent); border: 1px solid rgba(255,213,86,0.22); }
    .act-red    { background: rgba(248,113,113,0.09); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
    .act-gray   { background: rgba(148,163,184,0.07); color: var(--text-soft); border: 1px solid rgba(148,163,184,0.16); }

    .props-title { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-soft); font-weight: 600; margin-bottom: 14px; opacity: 0.7; }
    .props-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:560px){ .props-grid { grid-template-columns: 1fr; } }
    .prop-item { display: flex; gap: 9px; align-items: flex-start; }
    .prop-icon { font-size: 15px; flex-shrink: 0; margin-top: 2px; line-height: 1; }
    .prop-text { font-size: 12px; line-height: 1.6; color: var(--text-soft); }
    .prop-text strong { color: var(--text-main); font-weight: 600; display: block; font-size: 12px; margin-bottom: 1px; }

    .toast { position: fixed; top: 18px; right: 18px; padding: 12px 18px; background: rgba(94,232,160,0.95); color: #000; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transform: translateY(-12px); transition: all 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: none; }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9998; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: min(500px,88vw); max-height: 88vh; border-radius: 16px; border: 1px solid rgba(94,232,160,0.18); }
    footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 18px 24px; font-size: 12px; text-align: center; opacity: 0.6; margin-top: 48px; }
    footer .links { display: flex; justify-content: center; gap: 18px; margin-top: 6px; }
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
  <img id="lightboxImg" src="" alt="">
</div>

<header>
  <div class="nav-inner">
    <a href="index.html" class="logo-link">
      <div class="logo-dot">Ω</div>
      <div class="logo-text"><span class="logo-main">Z1N</span><span class="logo-sub">PROTOCOL</span></div>
    </a>
    <button class="hamburger" id="hamburger" type="button" aria-label="Menu"><span></span><span></span><span></span></button>
    <nav class="nav-links" id="navLinks">
      <a href="about.html">About</a>
      <a href="how-it-works.html">How it Works</a>
      <a href="live-stats.html">Live Stats</a>
      <a href="artefacts.html">Artefacts</a>
      <a href="nbi-artefacts.html">4 NBIs</a>
      <a href="mint-key.html">Mint Key</a>
      <a href="your-keys.html" class="active-keys">Your Keys</a>
    </nav>
  </div>
</header>

<main class="page">
  <a href="#" class="back-link" id="backLink">← Back to Key Dashboard</a>

  <div class="mint-layout">
    <div class="left-col">
      <div class="state-nav">
        <button class="s-dot d-unshared active" data-idx="0" title="Unshared" onclick="goState(0)"></button>
        <div class="s-arrow"><div class="s-arrow-line"></div><div class="s-arrow-head"></div></div>
        <button class="s-dot d-pending" data-idx="1" title="Pending" onclick="goState(1)"></button>
        <div class="s-arrow"><div class="s-arrow-line"></div><div class="s-arrow-head"></div></div>
        <button class="s-dot d-active" data-idx="2" title="Active" onclick="goState(2)"></button>
        <div class="s-arrow"><div class="s-arrow-line"></div><div class="s-arrow-head"></div></div>
        <button class="s-dot d-released" data-idx="3" title="Released" onclick="goState(3)"></button>
      </div>

      <div class="card-stage state-unshared" id="cardStage">
        <div class="artefact-preview" id="artPreview" onclick="openLightbox()">
          <img id="previewImg" src="" alt="Artefact">
          <div class="preview-overlay" id="previewOverlay">
            <div class="preview-spinner" id="previewSpinner"></div>
            <div class="preview-glyph" id="previewGlyph">◈</div>
          </div>
        </div>
        <div class="state-badge" id="stateBadge">UNSHARED · State 0</div>
        <div class="swipe-arrows">
          <button class="swipe-btn" id="btnPrev" onclick="goState(currentState-1)" disabled>‹</button>
          <button class="swipe-btn" id="btnNext" onclick="goState(currentState+1)">›</button>
        </div>
      </div>

      <div class="mint-form" id="mintForm">
        <div class="insc-label">
          <span>Inscription <span style="opacity:0.4;font-size:10px;">(optional · write-once)</span></span>
          <span class="insc-count" id="inscCount">0 / 64</span>
        </div>
        <input type="text" class="insc-input" id="inscInput" maxlength="64" placeholder="Your statement — permanent, on-chain">
        <button class="mint-btn" id="mintBtn" onclick="handleMint()">Mint Artefact — FREE</button>
        <div id="mintStatus"></div>
      </div>
    </div>

    <div class="right-col" id="rightCol"></div>
  </div>
</main>

<footer>
  <div>Your presence is real · The Field remembers</div>
  <div class="links">
    <a href="https://github.com/z1nprotocol" target="_blank" rel="noreferrer">GitHub</a>
    <a href="https://x.com/Z1N_AI" target="_blank" rel="noreferrer">X</a>
    <a href="https://discord.gg/FBkCGfFEcV" target="_blank" rel="noreferrer">Discord</a>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
<script>
(function(){
'use strict';

var API='https://z1n-backend-production.up.railway.app/api';
var CHAIN='0x89';
var Z1N_KEY='0x51A708cC79591cdE831B64773150cFaA41be3059';
var Z1N_ART='0x8f9C9760D530aA58A9cf13406888958c6856f326';
var PRICE='0x6124FEE993BC0000';
var provider=null,account=null,keyId=null,hasFirst=false,epoch=0;
window.currentState=0;

var STATES=[
  { key:'unshared', eyebrow:'◈ State 0 — Personal', title:'Mint your Artefact',
    badge:'PERSONAL · State 0',
    desc:'An artefact is a living mirror of your Key\'s presence in the Field — rendered from your on-chain activity. Your first artefact is free. It doesn\'t need to be shared: it can simply exist as a collectible, a record of your presence. The inscription you set at mint becomes part of the artefact itself — permanent, write-once, visible to anyone you share it with.',
    maker:{ label:'You see', pip:'#8f9ab5', items:['Full artefact preview — your Key\'s presence rendered','Inscription is embedded in the artefact','Keep it personal — no obligation to share','Or offer it to another Key when ready'], actions:[{label:'offer(artefactId, keyId, message)',cls:'act-yellow'}] },
    receiver:{ label:'No recipient yet', pip:'#8f9ab5', items:['Artefact stays in your personal possession','Not visible to others until offered'], actions:[] }
  },
  { key:'pending', eyebrow:'⟡ State 1 — Offered', title:'Offer sent',
    badge:'OFFERED · State 1',
    desc:'You\'ve offered the artefact to another Key. Include a message — it travels with the offer and is shown to the recipient. They decide: accept or reject. You can cancel any time to take it back.',
    maker:{ label:'You see', pip:'#ffd556', items:['Offer is live — waiting for response','Message you included is shown to recipient','Cannot offer to another Key while pending','Cancel to reclaim at any time'], actions:[{label:'cancel(artefactId)',cls:'act-gray'}] },
    receiver:{ label:'Recipient sees', pip:'#5ee8a0', items:['Incoming offering in their Received tab','Artefact preview and your offer message visible','Accept to bind — Reject to return to you'], actions:[{label:'accept(artefactId)',cls:'act-green'},{label:'reject(artefactId)',cls:'act-red'}] }
  },
  { key:'active', eyebrow:'◈ State 2 — Bounded', title:'Bounded',
    badge:'BOUNDED · State 2',
    desc:'The artefact is bounded — the recipient accepted and the bond is live between both Keys. The artefact\'s inscription is visible to both sides. Either can release the bond permanently at any time, with an optional release message stored on-chain.',
    maker:{ label:'You see', pip:'#93c5fd', items:['Artefact shows as Bounded in your Minted tab','Recipient Key shown on the card','Inscription visible to both sides','Release with an optional on-chain message'], actions:[{label:'release(artefactId, message)',cls:'act-red'}] },
    receiver:{ label:'Recipient sees', pip:'#5ee8a0', items:['Full artefact visible in Received tab','Inscription from maker shown','Bounded status confirmed on card','Can also release permanently at any time'], actions:[{label:'release(artefactId, message)',cls:'act-red'}] }
  },
  { key:'released', eyebrow:'◇ State 3 — Released', title:'Released',
    badge:'RELEASED · State 3',
    desc:'The bond is permanently dissolved. Either the maker or the recipient can release at any time — both sides have equal rights. RELEASED is terminal. The artefact and its inscription remain on-chain forever as a permanent record. The release message, if included, is stored in the event log.',
    maker:{ label:'You see', pip:'#f87171', items:['You or the recipient released the bond','Release message stored in event log','Inscription and artefact stay on-chain permanently','Terminal — no further transitions'], actions:[{label:'No further actions',cls:'act-gray'}] },
    receiver:{ label:'Recipient sees', pip:'#f87171', items:['Bond permanently dissolved','Artefact shows as Released in library','Release message visible if included','Terminal — no further transitions'], actions:[{label:'No further actions',cls:'act-gray'}] }
  }
];

var PROPS=[
  {icon:'🔒',title:'Soulbound',body:'No transfer, no burn. The artefact stays on-chain forever, tied to its source Key.'},
  {icon:'✍️',title:'Inscription',body:'Set once at mint, max 64 bytes. The inscription becomes part of the artefact itself — visible on the card, shared with any recipient, permanent on-chain regardless of what happens to the bond.'},
  {icon:'⚖️',title:'Equal release rights',body:'Both maker and recipient can release the bond at any time with an optional message.'},
  {icon:'♻️',title:'Reusable after reject',body:'Rejection returns the artefact to UNSHARED. Offer again — reject count is recorded.'}
];

function renderRight(){
  var s=STATES[currentState];
  var html='<div class="state-eyebrow eyebrow-'+s.key+'">'+s.eyebrow+'</div>'+
    '<div class="state-title title-'+s.key+'">'+s.title+'</div>'+
    '<div class="state-desc">'+s.desc+'</div>'+
    '<div class="pov-grid">'+pov(s.maker)+pov(s.receiver)+'</div>';
  if(currentState===0){
    html+='<div class="props-title">Properties</div><div class="props-grid">';
    PROPS.forEach(function(p){ html+='<div class="prop-item"><div class="prop-icon">'+p.icon+'</div><div class="prop-text"><strong>'+p.title+'</strong>'+p.body+'</div></div>'; });
    html+='</div>';
  }
  document.getElementById('rightCol').innerHTML=html;
}

function pov(p){
  var h='<div class="pov-card"><div class="pov-head"><div class="pov-pip" style="background:'+p.pip+'"></div>'+p.label+'</div>';
  p.items.forEach(function(i){ h+='<div class="pov-item">'+i+'</div>'; });
  p.actions.forEach(function(a){ h+='<span class="pov-action '+a.cls+'">'+a.label+'</span>'; });
  return h+'</div>';
}

window.goState=function(idx){
  if(idx<0||idx>3) return;
  currentState=idx;
  var s=STATES[idx];
  var stage=document.getElementById('cardStage');
  stage.className='card-stage state-'+(idx===2?'active':s.key);
  document.getElementById('stateBadge').textContent=s.badge;
  document.querySelectorAll('.s-dot').forEach(function(d){ d.classList.toggle('active',parseInt(d.dataset.idx)===idx); });
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===3;
  document.getElementById('mintForm').style.display=idx===0?'flex':'none';

  // visual: artefact card on 0+2, glyph symbol on 1+3
  var img=document.getElementById('previewImg');
  var overlay=document.getElementById('previewOverlay');
  var glyph=document.getElementById('previewGlyph');
  var sp=document.getElementById('previewSpinner');

  if(idx===1){
    // pending: yellow diamond glyph, hide artefact
    img.classList.remove('loaded'); img.style.display='none';
    overlay.style.display='flex'; sp.style.display='none';
    glyph.style.display='block'; glyph.textContent='◈';
  } else if(idx===3){
    // released: red diamond glyph
    img.classList.remove('loaded'); img.style.display='none';
    overlay.style.display='flex'; sp.style.display='none';
    glyph.style.display='block'; glyph.textContent='◇';
  } else {
    // 0 or 2: show real artefact preview
    glyph.style.display='none';
    if(epoch>0) renderPreviewForState();
  }

  renderRight();
};

// swipe
var tx=0;
var cs=document.getElementById('cardStage');
cs.addEventListener('pointerdown',function(e){ tx=e.clientX; });
cs.addEventListener('pointerup',function(e){
  var dx=e.clientX-tx;
  if(Math.abs(dx)>38){ if(dx<0&&currentState<3) goState(currentState+1); else if(dx>0&&currentState>0) goState(currentState-1); }
});

// inscription counter
var ii=document.getElementById('inscInput'),ic=document.getElementById('inscCount');
ii.addEventListener('input',function(){ var l=this.value.length; ic.textContent=l+' / 64'; ic.style.color=l>56?'var(--danger)':''; });

// params
function gp(n){ return new URL(window.location.href).searchParams.get(n); }
keyId=gp('key')!==null?parseInt(gp('key')):null;
var wp=gp('wallet')||'';
document.getElementById('backLink').href=keyId!==null?'key-dashboard.html?key='+keyId:'your-keys.html';

// preview
var firstArtefactId = null;

function loadPreview(){
  fetch(API+'/live').then(function(r){return r.json();}).then(function(d){
    epoch=d.currentEpoch||0;
    renderPreviewForState();
  }).catch(function(){
    document.getElementById('previewGlyph').style.display='block';
  });
}

function renderPreviewForState(){
  // Only show real artefact on state 0 (personal) and state 2 (bounded)
  if(currentState===1||currentState===3) return;

  var sp=document.getElementById('previewSpinner');
  var gl=document.getElementById('previewGlyph');
  var img=document.getElementById('previewImg');
  var overlay=document.getElementById('previewOverlay');

  sp.classList.add('active'); sp.style.display='block';
  gl.style.display='none';
  img.classList.remove('loaded'); img.style.display='none';
  overlay.style.display='flex';

  var artParam=firstArtefactId?'&artefactTokenId='+firstArtefactId:'';
  // No inscription param — artefact renders with blank inscription as designed
  var src=API+'/artefact/'+keyId+'/static-preview?epoch='+epoch+artParam+'&inscription=-&t='+Date.now();
  img.onload=function(){
    img.classList.add('loaded');
    img.style.display='block';
    sp.classList.remove('active'); sp.style.display='none';
    overlay.style.display='none';
  };
  img.onerror=function(){
    sp.classList.remove('active'); sp.style.display='none';
    gl.style.display='block';
  };
  img.src=src;
}

function loadKeyData(){
  fetch(API+'/key/'+keyId+'/artefacts').then(function(r){return r.json();}).then(function(d){
    var arts=d.liveArtefacts||[];
    hasFirst=arts.length>0;
    if(arts.length>0) firstArtefactId=arts[0].tokenId;
    updateBtn();
    if(firstArtefactId) renderPreviewForState();
  }).catch(function(){});
}

function updateBtn(){
  var b=document.getElementById('mintBtn');
  b.textContent=hasFirst?'Mint Extra Artefact — 7 POL':'Mint Artefact — FREE';
}

if(keyId!==null){ loadPreview(); loadKeyData(); }

// wallet
function getEth(){
  var wpLower = wp ? wp.toLowerCase() : '';
  var allProviders = [];
  if(window.ethereum && window.ethereum.providers && Array.isArray(window.ethereum.providers)){
    allProviders = allProviders.concat(window.ethereum.providers);
  } else if(window.ethereum){
    allProviders.push(window.ethereum);
  }
  if(window.phantom && window.phantom.ethereum && allProviders.indexOf(window.phantom.ethereum)===-1){
    allProviders.push(window.phantom.ethereum);
  }
  if(wpLower){
    for(var i=0;i<allProviders.length;i++){
      try{
        var accs=allProviders[i]._state&&allProviders[i]._state.accounts;
        if(accs&&accs.some(function(a){return a.toLowerCase()===wpLower;})) return allProviders[i];
      }catch(e){}
    }
    if(window.phantom&&window.phantom.ethereum){
      var sel=window.phantom.ethereum.selectedAddress;
      if(sel&&sel.toLowerCase()===wpLower) return window.phantom.ethereum;
    }
  }
  if(window.ethereum&&window.ethereum.providers&&Array.isArray(window.ethereum.providers)){
    return window.ethereum.providers.find(function(p){return p.isMetaMask&&!p.isBraveWallet;})||window.ethereum.providers[0];
  }
  if(window.ethereum) return window.ethereum;
  if(window.phantom&&window.phantom.ethereum) return window.phantom.ethereum;
  return null;
}

async function connectWallet(){
  var eth=provider||getEth();
  if(!eth){showS('No wallet found. Install MetaMask.','error');return false;}
  provider=eth;
  try{
    var a=await provider.request({method:'eth_accounts'});
    if(!a||!a.length) a=await provider.request({method:'eth_requestAccounts'});
    if(!a||!a.length){showS('No accounts found.','error');return false;}
    account=(wp?a.find(function(x){return x.toLowerCase()===wp.toLowerCase();}):null)||a[0];
    account=account.toLowerCase();
    var cid=await provider.request({method:'eth_chainId'});
    if(cid!==CHAIN){
      try{await provider.request({method:'wallet_switchEthereumChain',params:[{chainId:CHAIN}]});}
      catch(e){if(e.code===4902) await provider.request({method:'wallet_addEthereumChain',params:[{chainId:CHAIN,chainName:'Polygon',nativeCurrency:{name:'POL',symbol:'POL',decimals:18},rpcUrls:['https://rpc-mainnet.maticvigil.com'],blockExplorerUrls:['https://polygonscan.com']}]}); else throw e;}
    }
    var od='0x6352211e'+BigInt(keyId).toString(16).padStart(64,'0');
    var r=await fetch('https://polygon-mainnet.g.alchemy.com/v2/P7YcT2oy0Mfad2Pedbe3y',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_call',params:[{to:Z1N_KEY,data:od},'latest']})});
    var rd=await r.json();
    var owner='0x'+rd.result.slice(26).toLowerCase();
    if(owner!==account){showS('⚠ Key owned by '+owner.slice(0,6)+'…'+owner.slice(-4)+'. Switch wallet.','error');return false;}
    return true;
  } catch(e){showS(e.message||'Connection failed','error');return false;}
}

window.handleMint=async function(){
  var btn=document.getElementById('mintBtn');
  if(!account||!provider){showS('Connecting wallet...','pending');var ok=await connectWallet();if(!ok) return;}
  var insc=ii.value.trim().slice(0,64);
  btn.disabled=true;btn.textContent='Preparing...';showS('Preparing transaction...','pending');
  try{
    var fn=hasFirst?'mintExtra':'mint';
    var iface=new ethers.Interface(['function mint(uint256 keyId,string inscription)','function mintExtra(uint256 keyId,string inscription) payable']);
    var data=iface.encodeFunctionData(fn,[BigInt(keyId),insc]);
    var txp={from:account,to:Z1N_ART,data:data};if(hasFirst) txp.value=PRICE;
    showS('Confirm in wallet...','pending');btn.textContent='Confirm in wallet...';
    var txHash=await provider.request({method:'eth_sendTransaction',params:[txp]});
    showS('Waiting for confirmation...','pending');btn.textContent='Confirming...';
    var ok=await waitReceipt(txHash);
    if(ok){
      showS('✅ Minted! Redirecting to dashboard in 5 seconds... <a href="https://polygonscan.com/tx/'+txHash+'" target="_blank" style="color:var(--accent)">View tx ↗</a>','success');
      showToast('✅ Artefact minted!');btn.textContent='✅ Minted!';
      ii.value='';ic.textContent='0 / 64';hasFirst=true;updateBtn();btn.disabled=false;
      try{await fetch(API+'/reindex/artefacts',{method:'POST',headers:{'Content-Type':'application/json'}});}catch(e){}
      // Wacht 5 seconden zodat indexer tijd heeft de eerste mint te verwerken
      setTimeout(function(){window.location.href='key-dashboard.html?key='+keyId+'&tab=artefacts&refresh='+Date.now();},5000);
    } else { throw new Error('Transaction failed on-chain'); }
  }catch(e){
    var msg=e.message||'Unknown error';
    if(msg.includes('reject')||msg.includes('denied')||e.code===4001) msg='Transaction rejected';
    else if(msg.includes('reverted')||e.code===-32603) msg='Transaction failed — check wallet ownership';
    else if(msg.includes('insufficient')) msg='Insufficient funds for gas';
    showS(msg.slice(0,200),'error');btn.disabled=false;updateBtn();
  }
};

async function waitReceipt(h){
  for(var i=0;i<60;i++){
    await new Promise(function(r){setTimeout(r,2000);});
    try{
      var r=await fetch('https://polygon-mainnet.g.alchemy.com/v2/P7YcT2oy0Mfad2Pedbe3y',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_getTransactionReceipt',params:[h]})});
      var d=await r.json();
      if(d.result&&d.result.status==='0x1') return true;
      if(d.result&&d.result.status==='0x0') return false;
    }catch(e){}
  }
  return false;
}

function showS(msg,type){document.getElementById('mintStatus').innerHTML='<div class="status-msg '+type+'">'+msg+'</div>';}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},4000);}

window.openLightbox=function(){var img=document.getElementById('previewImg');if(!img.classList.contains('loaded'))return;document.getElementById('lightboxImg').src=img.src;document.getElementById('lightbox').classList.add('active');};

(async function(){
  var wpLower = wp ? wp.toLowerCase() : '';
  console.log('AUTO-CONNECT START wpLower:', wpLower);
  console.log('window.phantom exists:', !!window.phantom);
  console.log('window.phantom.ethereum exists:', !!(window.phantom && window.phantom.ethereum));
  if(window.phantom && window.phantom.ethereum){
    try{
      var debugAccs = await window.phantom.ethereum.request({method:'eth_accounts'});
      console.log('Phantom eth_accounts result:', debugAccs);
    }catch(e){ console.log('Phantom eth_accounts error:', e.message); }
  }
  if(wpLower && window.phantom && window.phantom.ethereum){
    try{
      // Probeer eerst silent
      var phantomAccs = await window.phantom.ethereum.request({method:'eth_accounts'});
      // Geen actieve sessie — forceer verbinding
      if(!phantomAccs || !phantomAccs.length){
        phantomAccs = await window.phantom.ethereum.request({method:'eth_requestAccounts'});
      }
      if(phantomAccs && phantomAccs.some(function(a){return a.toLowerCase()===wpLower;})){
        provider = window.phantom.ethereum;
        await connectWallet();
        return;
      }
    }catch(e){
      // Phantom geweigerd of niet beschikbaar — val terug op MM
    }
  }
  var eth=getEth();
  if(eth){
    try{
      var accs=await eth.request({method:'eth_accounts'});
      if(accs&&accs.length>0){
        await connectWallet();
      }
    }catch(e){}
  }
})();

if(hb&&nav){hb.addEventListener('click',function(){hb.classList.toggle('open');nav.classList.toggle('open');});nav.addEventListener('click',function(e){if(e.target.tagName==='A'){hb.classList.remove('open');nav.classList.remove('open');}});}

renderRight();
})();
